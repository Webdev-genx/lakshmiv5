<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Content Manager — Lakshmi Oral & Dental Care</title>
    <link rel="icon" href="/favicon.png" />
  </head>
  <body>
    <!-- Netlify Identity: must load and grab any recovery/invite token
         BEFORE Decap CMS mounts its router, which otherwise rewrites
         the hash (e.g. #recovery_token=... becomes #/recovery_token=...) -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      if (window.location.hash && window.location.hash.includes("_token=")) {
        window.netlifyIdentity.on("init", function () {});
      }
    </script>
    <!-- Decap CMS -->
    <script src="https://cdn.jsdelivr.net/npm/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
